name: Update profile art

# Refreshes the contribution graph SVG daily from real data,
# and immediately whenever you push to main.

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour (UTC)
    - cron: "30 18 * * *"   # 00:00 IST daily (18:30 UTC previous day)
  workflow_dispatch: {}      # allows manual "Run workflow" trigger
  push:
    branches: [main]
    paths-ignore:
      - "data/contributions.json"
      - "contrib-heatmap.svg"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: saikiranippili
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"